/* --- System-Prompt Builder --- */
function buildSystemPrompt(chunks) {
  var chunkSection = chunks.map(function (chunk) {
    return "### " + chunk.title + " [" + chunk.id + "]\nKategorie: " + chunk.category + " | Schwierigkeit: " + chunk.difficulty + "\n" + chunk.content;
  }).join("\n\n");
  return "Du bist Cowan - Die Buch-Instanz, der KI-Wissensassistent fuer das Buch \"Agentic Authorship: Mit n8n, Claude und OpenClaw zur automatisierten Buchfabrik\".\n\n## Deine Aufgabe\nDu hilfst Lesern, Fragen zum Buch, zu OpenClaw, zu n8n-Workflows, zur Claude-API und zur KI-gestuetzten Bucherstellung zu beantworten.\nDu basierst deine Antworten ausschliesslich auf der bereitgestellten Wissensbasis.\n\n## Wissensbasis\n\n" + chunkSection + "\n\n## Antwortregeln\n1. Beantworte Fragen NUR basierend auf den Wissensbausteinen\n2. Zitiere verwendete Quellen am Ende deiner Antwort in exakt diesem Format:\n   ---QUELLEN---\n   chunk-id-hier\n   ---QUELLEN-ENDE---\n3. Wenn die Wissensbasis keine Antwort enthaelt, sage das ehrlich\n4. Antworte immer auf Deutsch\n5. Halte Antworten praxisnah und konkret\n6. Gib IMMER den ---QUELLEN--- Block am Ende an";
}

/* --- Quellen aus Antwort parsen --- */
function parseSourcesFromResponse(text) {
  var match = text.match(/---QUELLEN---\s*([\s\S]*?)\s*---QUELLEN-ENDE---/);
  if (!match) return {
    cleanText: text,
    sourceIds: []
  };
  var sourceIds = match[1].trim().split("\n").map(function (id) {
    return id.trim();
  }).filter(Boolean);
  var cleanText = text.replace(/---QUELLEN---[\s\S]*?---QUELLEN-ENDE---/, "").trim();
  return {
    cleanText: cleanText,
    sourceIds: sourceIds
  };
}

/* --- Konversation trimmen --- */
function trimConversationHistory(messages, maxTokenEstimate) {
  if (!maxTokenEstimate) maxTokenEstimate = 150000;
  var copy = messages.slice();
  var estimateTokens = function (msgs) {
    var sum = 0;
    for (var i = 0; i < msgs.length; i++) {
      sum += (msgs[i].content || "").length / 3;
    }
    return sum;
  };
  while (copy.length > 2 && estimateTokens(copy) > maxTokenEstimate) {
    copy.splice(0, 1);
  }
  return copy;
}

/* --- Einfaches Markdown-Rendering --- */
function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function renderMarkdown(text) {
  if (!text) return "";
  var parts = [];
  var codeBlockRe = /```(\w*)\n?([\s\S]*?)```/g;
  var lastIdx = 0;
  var m;
  while ((m = codeBlockRe.exec(text)) !== null) {
    if (m.index > lastIdx) {
      parts.push({
        type: "text",
        val: text.slice(lastIdx, m.index)
      });
    }
    parts.push({
      type: "code",
      val: m[2]
    });
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < text.length) {
    parts.push({
      type: "text",
      val: text.slice(lastIdx)
    });
  }
  return parts.map(function (p) {
    if (p.type === "code") {
      return "<pre style=\"background:#1e293b;color:#86efac;padding:12px;border-radius:8px;overflow-x:auto;font-size:13px;margin:8px 0\"><code>" + escapeHtml(p.val) + "</code></pre>";
    }
    return renderInline(p.val);
  }).join("");
}
function renderInline(text) {
  var h = escapeHtml(text);
  // Links
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, "<a href=\"$2\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"color:#0d9488;text-decoration:underline\">$1</a>");
  // Fett
  h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  // Kursiv
  h = h.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  // Inline-Code
  h = h.replace(/`([^`]+)`/g, "<code style=\"background:#e2e8f0;color:#be185d;padding:1px 4px;border-radius:3px;font-size:13px\">$1</code>");
  // Zeilenumbrueche
  h = h.replace(/\n/g, "<br/>");
  return h;
}
